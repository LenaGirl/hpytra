services:
  api:
    build:
      context: ./hpytra-api
      dockerfile: Dockerfile
    image: hpytra-api:${IMAGE_TAG}
    container_name: hpytra-api
    ports:
      - "8000:8000"
    env_file:
      - ./hpytra-api/.env
    environment:
      PORT: 8000

  web:
    build:
      context: ./hpytra-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_GOOGLE_MAP_KEY: ${NEXT_PUBLIC_GOOGLE_MAP_KEY}
        NEXT_PUBLIC_GOOGLE_MAP_ID: ${NEXT_PUBLIC_GOOGLE_MAP_ID}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    image: hpytra-web:${IMAGE_TAG}
    container_name: hpytra-web
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_BASE_URL: http://api:8000
    depends_on:
      - api
