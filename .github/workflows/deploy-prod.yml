name: Deploy Production

on:
  # Push 到 main 時自動部署正式環境
  push:
    branches:
      - main
  # 啟用 GitHub Actions 頁面手動觸發
  workflow_dispatch:

concurrency:
  # 限制正式部署流程同時僅執行一個
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # 使用 GitHub runner 建置 image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # 推送 image 到 GHCR 需要 packages: write
      packages: write

    env:
      REGISTRY: ghcr.io
      API_IMAGE: ghcr.io/lenagirl/hpytra-api
      WEB_IMAGE: ghcr.io/lenagirl/hpytra-web
      # 以 commit SHA 當成正式部署版本號
      IMAGE_TAG: ${{ github.sha }}

    steps:
      # 取得目前 workflow 對應的 repository 程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 啟用 Docker Buildx，供後續建置與快取使用
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登入 GitHub Container Registry，供 image push 使用
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 建置並推送 Django API image
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./hpytra-api
          file: ./hpytra-api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 建置並推送 Next.js web image
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./hpytra-web
          file: ./hpytra-web/Dockerfile
          push: true
          # 前端的公開環境變數在 build 階段注入 image
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_GOOGLE_MAP_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_KEY }}
            NEXT_PUBLIC_GOOGLE_MAP_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_ID }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          tags: ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 透過 SSH 連到 AWS 主機，拉取並更新正式環境服務
      - name: Deploy to AWS host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_SSH_HOST }}
          username: ${{ secrets.AWS_SSH_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/ubuntu/hpytra
            # 讓 AWS 主機可以從 GHCR 拉取正式 image
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            # 以同一個 IMAGE_TAG 拉取並啟動對應版本
            IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose -f docker-compose.prod.yml pull
            IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose -f docker-compose.prod.yml up -d
