# Next.js 容器
upstream hpytra_web {
    server web:3000;
}

# Django API 容器
upstream hpytra_api {
    server api:8000;
}

server {
    # HTTP 入口統一轉向 HTTPS
    listen 80;
    server_name hpytra.com www.hpytra.com api.hpytra.com;

    return 301 https://$host$request_uri;
}

server {
    # 裸網域導向正式前端網域
    listen 443 ssl;
    server_name hpytra.com;

    ssl_certificate /etc/letsencrypt/live/hpytra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hpytra.com/privkey.pem;

    return 301 https://www.hpytra.com$request_uri;
}

server {
    # 正式前端網域
    listen 443 ssl;
    server_name www.hpytra.com;

    ssl_certificate /etc/letsencrypt/live/hpytra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hpytra.com/privkey.pem;

    client_max_body_size 10m;

    # Next.js build 後的靜態資源
    location /_next/static/ {
        proxy_pass http://hpytra_web;
        proxy_http_version 1.1;

        # 把原始 request 資訊傳給 Next.js
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js hashed assets 適合長時間快取
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 其他所有頁面請求都轉給 Next.js
    location / {
        proxy_pass http://hpytra_web;
        proxy_http_version 1.1;

        # 把原始 request 資訊傳給 Next.js
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 保留連線升級能力，例如 WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    # 正式 API 網域
    listen 443 ssl;
    server_name api.hpytra.com;

    ssl_certificate /etc/letsencrypt/live/hpytra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hpytra.com/privkey.pem;

    client_max_body_size 10m;

    # Django collectstatic 產出的靜態檔，直接由 nginx 提供
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 所有 /adminhpytra/ 請求轉給 Django
    location /adminhpytra/ {
        proxy_pass http://hpytra_api;
        proxy_http_version 1.1;

        # 把原始 request 資訊傳給 Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # 所有 /api/ 請求轉給 Django
    location /api/ {
        proxy_pass http://hpytra_api;
        proxy_http_version 1.1;

        # 把原始 request 資訊傳給 Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
