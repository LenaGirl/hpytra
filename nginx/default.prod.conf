# Next.js 容器
upstream hpytra_web {
    server web:3000;
}

# Django API 容器
upstream hpytra_api {
    server api:8000;
}

server {
    # nginx 容器內監聽 80 port
    listen 80;

    # 無 www 前端網域
    server_name hpytra.com;

    # 將 hpytra.com 永久轉址到正式前端網域
    return 301 https://www.hpytra.com$request_uri;
}

server {
    # nginx 容器內監聽 80 port
    listen 80;

    # 正式前端網域
    server_name www.hpytra.com;

    # 限制 request body 大小，避免上傳或表單太大被拒絕
    client_max_body_size 10m;

    # Next.js build 後的靜態資源
    location /_next/static/ {
        proxy_pass http://hpytra_web;
        proxy_http_version 1.1;

        # 把原始 request 資訊傳給 Next.js
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js hashed assets 適合長時間快取
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 其他所有頁面請求都轉給 Next.js
    location / {
        proxy_pass http://hpytra_web;
        proxy_http_version 1.1;

        # 把原始 request 資訊傳給 Next.js
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 保留連線升級能力，例如 WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    # nginx 容器內監聽 80 port
    listen 80;

    # 正式 API 網域
    server_name api.hpytra.com;

    # 限制 request body 大小，避免上傳或表單太大被拒絕
    client_max_body_size 10m;

    # Django collectstatic 產出的靜態檔，直接由 nginx 提供
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Django admin 後台請求轉給 Django
    location /adminhpytra/ {
        proxy_pass http://hpytra_api;
        proxy_http_version 1.1;

        # 把原始 request 資訊傳給 Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # 所有 /api/ 請求轉給 Django
    location /api/ {
        proxy_pass http://hpytra_api;
        proxy_http_version 1.1;

        # 把原始 request 資訊傳給 Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
