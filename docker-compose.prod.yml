services:
  nginx:
    image: nginx:stable-alpine
    container_name: hpytra-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro

  api:
    image: ghcr.io/lenagirl/hpytra-api:${IMAGE_TAG}
    container_name: hpytra-api
    restart: unless-stopped
    env_file:
      - /home/ubuntu/hpytra-secrets/hpytra-api.env.prod
    environment:
      PORT: 8000
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles

  web:
    image: ghcr.io/lenagirl/hpytra-web:${IMAGE_TAG}
    container_name: hpytra-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      INTERNAL_API_BASE_URL: http://api:8000
    expose:
      - "3000"

volumes:
  static_volume:
